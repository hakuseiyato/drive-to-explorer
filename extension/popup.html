<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>Drive to Explorer</title>
  <style>
    :root {
      --bg: #14161a; --panel-2: #262b34; --line: #333a45;
      --text: #e6e9ee; --text-dim: #8b94a3; --accent: #4da3ff; --accent-warm: #ffb03a;
      --danger: #ff5f6d; --ok: #3fcf8e;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Yu Gothic UI", "Hiragino Sans", Meiryo, sans-serif;
      min-width: 320px; margin: 0; padding: 14px; font-size: 13px;
      color: var(--text); background: var(--bg);
    }
    h1 {
      font-size: 13px; margin: 0 0 12px; font-weight: 700; display: flex; align-items: center; gap: 8px;
    }
    h1::before {
      content: ""; width: 8px; height: 8px; border-radius: 2px; background: var(--accent); display: inline-block;
    }
    .row { margin-bottom: 10px; word-break: break-all; }
    .label {
      color: var(--text-dim); font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 4px;
    }
    .path {
      background: var(--panel-2); border: 1px solid var(--line); padding: 7px 9px;
      border-radius: 6px; font-family: ui-monospace, Consolas, monospace; font-size: 12px;
    }
    .actions { display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap; }
    button {
      font: inherit; font-weight: 600; padding: 7px 11px; border: 1px solid var(--line);
      background: var(--panel-2); color: var(--text); border-radius: 6px; cursor: pointer;
      transition: filter .15s, border-color .15s;
    }
    button:hover:not(:disabled) { border-color: var(--accent); }
    button:active:not(:disabled) { transform: translateY(1px); }
    button.primary { background: var(--accent); color: #0a0d12; border-color: var(--accent); }
    button.primary:hover:not(:disabled) { filter: brightness(1.1); }
    button:disabled { opacity: 0.45; cursor: default; }
    .muted { color: var(--text-dim); font-size: 12px; }
    .ok { color: var(--ok); }
    .err { color: var(--danger); }
    #signinRow {
      border-left: 3px solid var(--accent-warm); background: rgba(255,176,58,0.08);
      padding: 8px 10px; border-radius: 6px;
    }
    #signinRow button { margin-top: 6px; }
  </style>
</head>
<body>
  <h1>Drive to Explorer</h1>
  <div class="row">
    <div class="label">Drive 階層</div>
    <div class="path" id="breadcrumbs">―</div>
  </div>
  <div class="row">
    <div class="label">ローカルパス</div>
    <div class="path" id="localPath">―</div>
  </div>
  <div class="row" id="status"></div>
  <div class="row" id="signinRow" style="display:none;">
    <div class="muted" style="margin-bottom:2px;">
      ⚠ API を使わず Drive 画面から階層を推定したため、深い階層では不正確になる場合があります。<br>
      サインインすると Drive API で正確なパス（共有ドライブ含む）を取得します。
    </div>
    <button id="signinBtn">Google でサインイン</button>
  </div>
  <div class="actions">
    <button class="primary" id="openBtn" disabled>エクスプローラーで開く</button>
    <button id="copyBtn" disabled>パスをコピー</button>
    <button id="optionsBtn">設定</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
